<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Website | 个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f2f5f8;
            color: #333;
            line-height: 1.6;
        }

        /* 导航栏整体 */
        #navbar {
            background: #1e293b;
            padding: 1.2rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 99;
        }

            #navbar ul {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 12px;
                list-style: none;
                flex-wrap: wrap;
            }

        /* 每个导航都是按钮！！！ */
        .nav-btn {
            background: #334155;
            padding: 10px 16px;
            border-radius: 10px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

            .nav-btn:hover {
                background: #3b82f6;
                transform: translateY(-3px);
                box-shadow: 0 4px 12px rgba(59,130,246,0.3);
            }

            .nav-btn a {
                color: white;
                font-weight: 600;
                text-decoration: none;
                cursor: pointer;
            }

        .container {
            max-width: 920px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 1.6rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
            margin-bottom: 1.2rem;
        }

        h1 {
            font-size: 2rem;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.4rem;
            color: #2563eb;
            margin: 1.4rem 0 0.8rem;
        }

        p {
            font-size: 1rem;
            margin-bottom: 0.8rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.2s;
        }

            .project-card:hover {
                transform: translateY(-4px);
            }

        .project-image {
            width: 100%;
            border-radius: 12px;
            margin: 1.2rem 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        ul {
            margin-left: 1.5rem;
        }

        li {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div id="content" class="container"></div>
    <script src="app.js"></script>
</body>
</html>
